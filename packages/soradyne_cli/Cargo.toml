[package]
name = "soradyne-cli"
version = "0.1.0"
edition = "2021"
description = "CLI for Soradyne capsule management and flow inspection"

[dependencies]
soradyne = { path = "../soradyne_core", default-features = false }
clap = { version = "4", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4", "serde"] }
hex = "0.4"
chrono = { version = "0.4", features = ["serde"] }
hostname = "0.4"
